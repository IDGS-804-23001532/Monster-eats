{% extends "layout.html" %}

{% block content %}
<div class="p-4 transition-colors duration-200">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-bold text-heading dark:text-white">Gestión de Usuarios</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">Administra el personal y sus permisos de acceso.</p>
        </div>
        <button class="flex items-center px-4 py-2 text-white bg-[#FF6B00] hover:brightness-90 rounded-base font-semibold transition-all">
            <svg class="w-5 h-5 me-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
            Nuevo Usuario
        </button>
    </div>

    <div class="relative overflow-x-auto shadow-md rounded-base border border-default dark:border-gray-700 bg-neutral-primary-soft dark:bg-gray-800">
        <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
            <thead class="text-xs text-heading uppercase bg-neutral-secondary-soft dark:bg-gray-700 dark:text-gray-300">
                <tr>
                    <th class="px-6 py-4">Usuario</th>
                    <th class="px-6 py-4">Rol</th>
                    <th class="px-6 py-4">Estatus</th>
                    <th class="px-6 py-4">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr class="border-b dark:border-gray-700 hover:bg-neutral-tertiary dark:hover:bg-gray-700 transition-colors">
                    <th class="flex items-center px-6 py-4 font-medium text-heading dark:text-white">
                        <div class="ps-3">
                            <div class="text-base font-semibold">Bryan Uriel Hernández</div>
                            <div class="font-normal text-gray-500">uriel@monstereats.com</div>
                        </div>
                    </th>
                    <td class="px-6 py-4">
                        <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-blue-900 dark:text-blue-300">Gerente</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="h-2.5 w-2.5 rounded-full bg-green-500 me-2"></div> Activo
                        </div>
                    </td>
                    <td class="px-6 py-4 space-x-2">
                        <button class="font-medium text-blue-600 dark:text-blue-500 hover:underline">Editar</button>
                        <button class="font-medium text-red-600 dark:text-red-500 hover:underline">Suspender</button>
                    </td>
                </tr>
                <tr class="border-b dark:border-gray-700 hover:bg-neutral-tertiary dark:hover:bg-gray-700">
                    <th class="flex items-center px-6 py-4 font-medium text-heading dark:text-white">
                        <div class="ps-3">
                            <div class="text-base font-semibold">Diego Alejandro</div>
                            <div class="font-normal text-gray-500">diego.cocina@monstereats.com</div>
                        </div>
                    </th>
                    <td class="px-6 py-4">
                        <span class="bg-gray-100 text-gray-800 text-xs font-medium px-2.5 py-0.5 rounded dark:bg-gray-700 dark:text-gray-300">Cocinero</span>
                    </td>
                    <td class="px-6 py-4">
                        <div class="flex items-center">
                            <div class="h-2.5 w-2.5 rounded-full bg-green-500 me-2"></div> Activo
                        </div>
                    </td>
                    <td class="px-6 py-4 space-x-2">
                        <button class="font-medium text-blue-600 dark:text-blue-500 hover:underline">Editar</button>
                        <button class="font-medium text-red-600 dark:text-red-500 hover:underline">Suspender</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
