{% import "macros/_macros.html" as macros %}
<div id="modal-actualizar-{{ cp.id_categoria_proveedor }}" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-md max-h-full">
        <div class="relative bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl">
            
            <div class="flex items-center justify-between p-5 border-b border-slate-700 rounded-t-2xl">
                <h3 class="text-xl font-bold text-white">Editar Categoría</h3>
                <button type="button" class="text-slate-400 bg-transparent hover:bg-slate-800 hover:text-white rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center transition-colors" data-modal-hide="modal-actualizar-{{ cp.id_categoria_proveedor }}">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
                </button>
            </div>
            
            <form action="{{ url_for('proveedor.actualizar_categoria', id=cp.id_categoria_proveedor) }}" method="POST", novalidate>
                {{ form.csrf_token }}
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="p-5">
                    <div>
                        {{ macros.camposNuevos(form.nombre, class_="text-white bg-slate-800 border border-slate-600 text-white text-sm rounded-lg focus:ring-orange-500 focus:border-orange-500 block w-full p-3 placeholder-slate-400") }}
                    </div>
                </div>
                <div class="flex justify-end gap-3 p-5 border-t border-slate-700 rounded-b-2xl">
                    <button data-modal-hide="modal-actualizar-{{ cp.id_categoria_proveedor }}" type="button" class="text-slate-300 bg-transparent hover:bg-slate-800 border border-slate-600 focus:ring-4 focus:ring-slate-700 font-medium rounded-lg text-sm px-5 py-2.5">Cancelar</button>
                    <button type="submit" class="text-white bg-orange-500 hover:bg-orange-600 focus:ring-4 focus:ring-orange-500/50 font-medium rounded-lg text-sm px-5 py-2.5 shadow-lg shadow-orange-500/20">Actualizar</button>
                </div>
            </form>
            
        </div>
    </div>
</div>
