{% extends "layout.html" %}

{% block content %}
<div class="p-6 bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">

    <div class="flex gap-4 mb-6">
        <button
            class="px-6 py-2.5 text-sm font-semibold text-gray-700 bg-gray-100 rounded-full hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors">
            Productos Terminados
        </button>
        <button
            class="px-6 py-2.5 text-sm font-semibold text-white bg-orange-500 rounded-full hover:bg-orange-600 transition-colors">
            Combos Dinámicos
        </button>
    </div>

    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 shadow-sm">

        <div class="flex justify-between items-start mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white tracking-wide mb-1">Combo clásico</h2>
                <p class="text-gray-500 dark:text-gray-400 font-semibold text-sm">Productos incluidos</p>
            </div>
            <div class="text-right flex flex-col items-end">
                <div class="text-3xl font-extrabold text-orange-500 leading-none mb-2">$99</div><br>
                <span
                    class="bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-300 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">Activo</span>
            </div>
        </div>

        <div class="overflow-x-auto pb-4">
            <div class="flex gap-4">

                <div
                    class="shrink-0 w-[240px] flex items-center gap-3 bg-gray-50 dark:bg-gray-700/50 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600">
                    <div
                        class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 text-xs font-bold w-8 h-8 flex items-center justify-center rounded-full shrink-0">
                        1x
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium text-gray-900 dark:text-gray-200 truncate">Hamburguesa Clásica</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Stock: 45</p>
                    </div>
                </div>

                <div
                    class="shrink-0 w-[240px] flex items-center gap-3 bg-gray-50 dark:bg-gray-700/50 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600">
                    <div
                        class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 text-xs font-bold w-8 h-8 flex items-center justify-center rounded-full shrink-0">
                        1x
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium text-gray-900 dark:text-gray-200 truncate">Papas Fritas</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Stock: 67</p>
                    </div>
                </div>

                <div
                    class="shrink-0 w-[240px] flex items-center gap-3 bg-gray-50 dark:bg-gray-700/50 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600">
                    <div
                        class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 text-xs font-bold w-8 h-8 flex items-center justify-center rounded-full shrink-0">
                        1x
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium text-gray-900 dark:text-gray-200 truncate">Refresco grande</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Stock: 89</p>
                    </div>
                </div>

                <div
                    class="shrink-0 w-[240px] flex items-center gap-3 bg-gray-50 dark:bg-gray-700/50 px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600">
                    <div
                        class="bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-300 text-xs font-bold w-8 h-8 flex items-center justify-center rounded-full shrink-0">
                        2x
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-medium text-gray-900 dark:text-gray-200 truncate">Aderezo Especial</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Stock: 120</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

</div>
{% endblock %}
