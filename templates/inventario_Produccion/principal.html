{% extends "layout.html" %}

{% block content %}
<div class="p-6 bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">

    <div class="flex gap-4 mb-6">
        <button
            class="px-6 py-2.5 text-sm font-semibold text-white bg-orange-500 rounded-full hover:bg-orange-600 transition-colors">
            Productos Terminados
        </button>
        <button
            class="px-6 py-2.5 text-sm font-semibold text-gray-700 bg-gray-100 rounded-full hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors">
            Combos Dinámicos
        </button>
    </div>

    <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
        <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
            <thead class="text-xs text-white uppercase bg-slate-800 dark:bg-slate-800">
                <tr>
                    <th scope="col" class="px-6 py-3">
                        ID
                    </th>
                    <th scope="col" class="px-6 py-3">
                        Producto
                    </th>
                    <th scope="col" class="px-6 py-3">
                        Stock Disponible
                    </th>
                    <th scope="col" class="px-6 py-3">
                        Precio Venta
                    </th>
                    <th scope="col" class="px-6 py-3 text-center">
                        Estado
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr
                    class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600">
                    <td class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
                        1
                    </td>
                    <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">
                        Hamburguesa Monster Doble
                    </td>
                    <td class="px-6 py-4">
                        45 Unidades
                    </td>
                    <td class="px-6 py-4">
                        $55.00
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span
                            class="inline-flex items-center justify-center px-3 py-1 text-xs font-bold leading-none text-green-800 bg-green-100 rounded-full dark:bg-green-900/40 dark:text-green-400 border border-green-300 dark:border-green-800">
                            <span class="w-2 h-2 mr-1.5 bg-green-500 rounded-full"></span>
                            Disponible
                        </span>
                    </td>
                </tr>

                <tr
                    class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600">
                    <td class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap dark:text-white">
                        2
                    </td>
                    <td class="px-6 py-4 font-medium text-gray-900 dark:text-white">
                        Papas a la Francesa Grandes
                    </td>
                    <td class="px-6 py-4">
                        120 Unidades
                    </td>
                    <td class="px-6 py-4">
                        $35.00
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span
                            class="inline-flex items-center justify-center px-3 py-1 text-xs font-bold leading-none text-green-800 bg-green-100 rounded-full dark:bg-green-900/40 dark:text-green-400 border border-green-300 dark:border-green-800">
                            <span class="w-2 h-2 mr-1.5 bg-green-500 rounded-full"></span>
                            Disponible
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
