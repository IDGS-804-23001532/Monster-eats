{% extends 'layout.html' %}

{% block content %}
<main class="max-w-screen-md mx-auto px-4 py-20 text-center">
  <div class="bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 rounded-2xl p-8 shadow-sm">
    <h1 class="text-2xl font-extrabold mb-4">Debes iniciar sesión</h1>
    <p class="text-gray-600 dark:text-gray-400 mb-6">Para comprar o agregar productos debes iniciar sesión primero.</p>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-3">
      <a href="{{ url_for('auth.login', next=next) }}" class="px-6 py-3 bg-orange-500 text-white rounded-lg font-semibold">Iniciar sesión</a>
      <a href="{{ url_for('auth.register', next=next) }}" class="px-6 py-3 border border-gray-200 dark:border-gray-700 rounded-lg">Crear cuenta</a>
    </div>

    <p class="text-sm text-gray-500 mt-6">Si ya tienes cuenta, inicia sesión; si no, crea una cuenta para poder completar tus compras.</p>

    <div class="mt-6">
      <a href="{{ next }}" class="text-sm text-gray-600 hover:underline">Volver</a>
    </div>
  </div>
</main>
{% endblock %}
