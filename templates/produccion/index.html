{% extends "layout.html" %}
{% block content %}
<div class="p-4 bg-white border border-gray-200 rounded-lg shadow-sm">
    <h1 class="text-2xl font-bold mb-6">Órdenes de Producción Pendientes</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for orden in ordenes %}
        <div class="p-4 border rounded-lg bg-gray-50 border-gray-300">
            <div class="flex justify-between items-start mb-2">
                <span class="text-xs font-bold uppercase px-2 py-1 bg-yellow-100 text-yellow-800 rounded">{{ orden.estado }}</span>
                <span class="text-gray-500 text-xs">ID: #{{ orden.id_orden_produccion }}</span>
            </div>
            <h3 class="text-lg font-bold">{{ orden.producto.nombre }}</h3>
            <p class="text-sm text-gray-600 mb-4">Cantidad solicitada: <span class="font-bold">{{ orden.cantidad_programada }}</span></p>
            
            <form action="{{ url_for('produccion.finalizar_produccion', id_orden=orden.id_orden_produccion) }}" method="POST">
                <input type="hidden" name="cantidad_producida" value="{{ orden.cantidad_programada }}">
                <button type="submit" class="w-full py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition">
                    Marcar como Completada
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
