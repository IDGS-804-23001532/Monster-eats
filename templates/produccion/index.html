{% extends "layout.html" %}

{% block content %}
<div class="p-4 transition-colors duration-200">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-heading dark:text-white">Panel de Producción</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Control de transformación de materia prima.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-neutral-secondary-soft dark:bg-gray-800 p-4 rounded-base border-t-4 border-yellow-400 shadow-sm">
            <h2 class="font-bold text-heading dark:text-white mb-4 flex justify-between items-center">
                Pendientes <span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-0.5 rounded">2</span>
            </h2>
            <div class="bg-neutral-primary-soft dark:bg-gray-700 p-3 rounded shadow-sm mb-3">
                <div class="text-xs font-bold text-brand uppercase mb-1">Orden #204</div>
                <div class="text-sm font-semibold text-heading dark:text-white">10x Monster Classic</div>
                <button class="mt-3 w-full py-1.5 text-xs font-bold text-white bg-blue-600 rounded hover:bg-blue-700 transition-colors">
                    Iniciar Producción
                </button>
            </div>
        </div>

        <div class="bg-neutral-secondary-soft dark:bg-gray-800 p-4 rounded-base border-t-4 border-blue-500 shadow-sm">
            <h2 class="font-bold text-heading dark:text-white mb-4 flex justify-between items-center">
                En Proceso <span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded">1</span>
            </h2>
            <div class="bg-neutral-primary-soft dark:bg-gray-700 p-3 rounded shadow-sm border border-blue-400 animate-pulse">
                <div class="text-xs font-bold text-blue-500 uppercase mb-1">Orden #203</div>
                <div class="text-sm font-semibold text-heading dark:text-white">5x Monster XL</div>
                <div class="mt-2 text-[10px] text-gray-400 italic">Cocinero: Diego G.</div>
                <button class="mt-3 w-full py-1.5 text-xs font-bold text-white bg-green-600 rounded hover:bg-green-700">
                    Marcar como Listo
                </button>
            </div>
        </div>

        <div class="bg-neutral-secondary-soft dark:bg-gray-800 p-4 rounded-base border-t-4 border-green-500 shadow-sm opacity-90">
            <h2 class="font-bold text-heading dark:text-white mb-4">Resumen del Turno</h2>
            <div class="text-center py-4">
                <div class="text-4xl font-bold text-green-500">14</div>
                <div class="text-xs text-gray-500 uppercase">Órdenes Completadas</div>
            </div>
            <div class="text-sm text-gray-400 mt-2 border-t dark:border-gray-700 pt-2">
                Efectividad: <span class="text-green-500">92%</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
