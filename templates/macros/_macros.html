{% macro camposNuevos(field) %}
  <label class="block mb-2 text-sm font-medium text-slate-300">{{ field.label }}</label>
  
  <dd>{{ field(**kwargs) }}</dd>

  {% if field.errors %}
    <ul>
      {% for error in field.errors %}
        <li style="color: red;">{{ error }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endmacro %}
