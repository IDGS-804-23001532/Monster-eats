{% macro camposNuevos(field) %}
  <h2 class="font-bold text-gray-800 dark:text-white text-white">{{ field.label }}</h2>
  
  <dd>{{ field(**kwargs) | safe }}</dd>

  {% if field.errors %}
    <ul>
      {% for error in field.errors %}
        <li style="color: red;">{{ error }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endmacro %}
