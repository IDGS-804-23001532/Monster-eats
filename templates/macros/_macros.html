{% macro camposNuevos(field) %}
  <label for="{{ field.id }}" class="block mb-2 text-sm font-medium text-slate-300">{{ field.label }}</label>
  
  <dd>{{ field(**kwargs) | safe }}</dd>

  {% if field.errors %}
    <ul class="mt-1">
      {% for error in field.errors %}
        <li class="text-red-500 text-xs font-semibold">{{ error }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endmacro %}
