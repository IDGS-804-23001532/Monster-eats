{% macro camposNuevos(field) %}
  <label class="block mb-2 text-sm font-medium text-white">{{ field.label }}</label>
  
  <div>{{ field(**kwargs) | safe }}</div>

  {% if field.errors %}
    <ul class="mt-1 list-disc list-inside">
      {% for error in field.errors %}
        <li class="text-red-400 text-xs font-semibold">{{ error }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endmacro %}
