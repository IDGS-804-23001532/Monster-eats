{% extends 'layout.html' %}

{% block content %}
    <div class="min-h-[80vh] flex items-center justify-center relative overflow-hidden p-6 font-sans">
        
        <div class="absolute inset-0 z-0 opacity-20 pointer-events-none">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-orange-500/20 via-transparent to-transparent"></div>
        </div>

        <div class="relative z-10 w-full max-w-4xl bg-gray-800 rounded-[2rem] border border-gray-700 shadow-2xl p-10 md:p-16 text-center transform hover:scale-[1.01] transition-transform duration-300">
            
            <div class="flex justify-center mb-8">
                <div class="w-24 h-24 bg-orange-500/10 rounded-full flex items-center justify-center border border-orange-500/30 shadow-[0_0_15px_rgba(249,115,22,0.3)]">
                    <svg class="w-12 h-12 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.657 18.657z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.343 14.343L12 14c-1.104 0-2-.896-2-2 0-1.104.896-2 2-2 1.104 0 2 .896 2 2 0 1.104-.896 2-2 2z" />
                    </svg>
                </div>
            </div>

            <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter text-white mb-6 drop-shadow-[0_0_15px_rgba(249,115,22,0.5)]">
                Bienvenido
            </h1>
            
            <p class="text-2xl md:text-3xl font-semibold text-gray-200 tracking-tight">
                <span class="text-orange-500 font-extrabold">Monster Eats</span>
            </p>

            <div class="w-32 h-1 bg-orange-500 mx-auto rounded-full mt-10 opacity-60"></div>

        </div>
    </div>
{% endblock %}
